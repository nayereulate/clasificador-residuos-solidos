<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión – EcoTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #1b4332;
            --primary-light: #2d6a4f;
            --accent: #52b788;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2d1f 0%, #1b4332 40%, #2d6a4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-wrapper { width: 100%; max-width: 420px; }

        .login-card {
            background: #fff;
            border-radius: 22px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            padding: 36px 36px 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-header::before {
            content: '♻';
            position: absolute;
            font-size: 120px;
            opacity: 0.05;
            right: -10px;
            top: -10px;
            line-height: 1;
        }

        .login-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 16px;
            backdrop-filter: blur(4px);
        }

        .login-header h1 {
            color: #fff;
            font-size: 1.7rem;
            font-weight: 800;
            margin: 0 0 6px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: rgba(255,255,255,0.65);
            margin: 0;
            font-size: 0.85rem;
        }

        .login-body { padding: 32px 36px 36px; }

        .form-label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #374151;
            margin-bottom: 5px;
        }

        .form-control {
            border-radius: 10px;
            border-color: #d1d5db;
            padding: 10px 14px;
            font-size: 0.875rem;
            transition: border-color 0.12s, box-shadow 0.12s;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(82,183,136,0.18);
        }

        .input-group .form-control { border-radius: 10px 0 0 10px; }
        .input-group .btn { border-radius: 0 10px 10px 0; border-color: #d1d5db; background: #f9fafb; color: #6b7280; }
        .input-group .btn:hover { background: #f3f4f6; }

        .btn-login {
            width: 100%;
            padding: 11px;
            border-radius: 11px;
            background: var(--primary);
            border: none;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            transition: background 0.15s, transform 0.12s;
            margin-top: 4px;
        }

        .btn-login:hover {
            background: #163829;
            transform: translateY(-1px);
        }

        .btn-login:active { transform: translateY(0); }

        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 12px 16px;
            color: #dc2626;
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-footer {
            text-align: center;
            padding: 16px 36px 24px;
            color: #9ca3af;
            font-size: 0.75rem;
            border-top: 1px solid #f3f4f6;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">♻</div>
            <h1>EcoTrack</h1>
            <p>Sistema de Gestión de Residuos Sólidos</p>
        </div>

        <div class="login-body">
            <p class="text-center mb-4" style="color:#6b7280; font-size:0.85rem;">
                Ingresa tus credenciales para continuar
            </p>

            {% if form.errors or error %}
            <div class="error-box">
                <i class="fa-solid fa-circle-exclamation"></i>
                Usuario o contraseña incorrectos. Intenta de nuevo.
            </div>
            {% endif %}

            <form method="POST" autocomplete="on">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fa-solid fa-user me-1" style="color:#9ca3af;"></i>
                        Usuario
                    </label>
                    <input type="text" name="username" class="form-control"
                           placeholder="Nombre de usuario" required autofocus
                           value="{{ form.username.value|default:'' }}">
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        <i class="fa-solid fa-lock me-1" style="color:#9ca3af;"></i>
                        Contraseña
                    </label>
                    <div class="input-group">
                        <input type="password" name="password" id="pwd-input"
                               class="form-control" placeholder="••••••••" required>
                        <button type="button" class="btn btn-outline-secondary"
                                onclick="togglePwd()" title="Mostrar/ocultar">
                            <i class="fa-solid fa-eye" id="pwd-icon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>
                    Iniciar sesión
                </button>
            </form>
        </div>

        <div class="login-footer">
            EcoTrack &copy; 2025 · Sistema de Control y Manejo de Residuos
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePwd() {
        const input = document.getElementById('pwd-input');
        const icon  = document.getElementById('pwd-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
</body>
</html>
