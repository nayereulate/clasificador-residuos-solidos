{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="{% url 'contabilidad:lista_egresos' %}" class="btn btn-sm btn-outline-secondary">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="h4 fw-700 mb-0">{{ titulo }}</h1>
        </div>

        <div class="card border-0" style="background:var(--card-bg);box-shadow:var(--card-shadow)">
            <div class="card-body p-4">
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-sm-8">
                            <label class="form-label fw-500">Concepto</label>
                            {{ form.concepto }}
                        </div>
                        <div class="col-sm-4">
                            <label class="form-label fw-500">Fecha</label>
                            {{ form.fecha }}
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label fw-500">Categoría</label>
                            {{ form.categoria }}
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label fw-500">Monto ($)</label>
                            {{ form.monto }}
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-500">Descripción</label>
                            {{ form.descripcion }}
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-danger">
                            <i class="fa-solid fa-floppy-disk me-1"></i>Guardar
                        </button>
                        <a href="{% url 'contabilidad:lista_egresos' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
